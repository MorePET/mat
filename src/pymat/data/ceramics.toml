# ============================================================================
# Aluminum Nitride (AlN) — high-thermal-conductivity electronic substrate (#134)
# ============================================================================
# Engineering canonical = sintered AlN-170 commercial grade. Theoretical
# single-crystal thermal conductivity is ~285 W/(m·K) (Slack 1987,
# DOI 10.1016/0022-3697(87)90153-3); commercial sintered AlN ranges
# 140–200 W/(m·K) depending on grain-boundary oxide content. We quote
# 170 W/(m·K) (CoorsTek AlN-170) as the canonical engineering scalar.
# Mechanical numbers (E, flexural strength) are also from the CoorsTek
# AlN-170 brochure / vendor literature. Density 3.26 g/cm^3 is the
# X-ray crystallographic value for the wurtzite AlN unit cell.
[aln]
name = "Aluminum Nitride"
formula = "AlN"

[aln.mechanical]
density_value = 3.26
density_unit = "g/cm^3"
youngs_modulus_value = 320
youngs_modulus_unit = "GPa"
poissons_ratio = 0.24
flexural_strength_value = 320
flexural_strength_unit = "MPa"
hardness_vickers = 11.0
fracture_toughness_value = 2.6
fracture_toughness_unit = "MPa*m^0.5"
cte_anisotropic = [4.2e-6, 4.2e-6, 5.3e-6]

[aln.thermal]
melting_point_value = 2200
melting_point_unit = "degC"
thermal_conductivity_value = 170
thermal_conductivity_unit = "W/(m*K)"
specific_heat_value = 740
specific_heat_unit = "J/(kg*K)"
thermal_expansion_value = 4.5e-6
thermal_expansion_unit = "1/K"
max_service_temp_value = 1700
max_service_temp_unit = "degC"

[aln.electrical]
volume_resistivity_value = 1e14
volume_resistivity_unit = "ohm*cm"
dielectric_constant = 8.6
dielectric_loss_tangent = 0.0005
breakdown_voltage_value = 17
breakdown_voltage_unit = "kV/mm"

[aln.vis]
base_color = [0.9, 0.9, 0.88, 1.0]
transmission = 0.0
metallic = 0.0
roughness = 0.45

[aln.vis.finishes]
white = { source = "ambientcg", id = "Porcelain001" }


# ============================================================================
# LTCC DuPont 951 — low-temperature cofired ceramic (#135)
# ============================================================================
# Vendor-canonical: DuPont GreenTape 951 public datasheet (MCM951, 7/2011).
# All values transcribed verbatim from the "Typical Tape Properties" table
# of that PDF. License = proprietary-reference-only. The product line is
# now stewarded by Heraeus (post-2021 acquisition), but the technical
# datasheet referenced here is the long-lived DuPont public TDS that the
# RF/LTCC literature cites.
[ltcc951]
name = "LTCC DuPont 951"
grade = "GreenTape 951"
vendor = "DuPont (now Heraeus)"

[ltcc951.mechanical]
density_value = 3.1
density_unit = "g/cm^3"
youngs_modulus_value = 120
youngs_modulus_unit = "GPa"
flexural_strength_value = 230
flexural_strength_unit = "MPa"

[ltcc951.thermal]
thermal_conductivity_value = 3.3
thermal_conductivity_unit = "W/(m*K)"
thermal_expansion_value = 5.8e-6
thermal_expansion_unit = "1/K"

[ltcc951.electrical]
dielectric_constant = 7.8
dielectric_loss_tangent = 0.006
volume_resistivity_value = 1e12
volume_resistivity_unit = "ohm*cm"
breakdown_voltage_value = 40
breakdown_voltage_unit = "kV/mm"

# X/Y shrinkage = 12.7% ± 0.3% (PT/P2/PX), Z shrinkage = 15% ± 0.5%.
# Critical for cofired-substrate dimensioning. Schema has no shrinkage
# field; recorded as a custom block so it survives the loader without
# needing a schema change.
[ltcc951.custom]
shrinkage_xy_pct = 12.7
shrinkage_z_pct = 15.0
dielectric_constant_at_10ghz = 7.5
surface_roughness_um = 0.34

[ltcc951.vis]
base_color = [0.92, 0.9, 0.85, 1.0]
transmission = 0.0
metallic = 0.0
roughness = 0.5

[ltcc951.vis.finishes]
white = { source = "ambientcg", id = "Porcelain001" }


# ============================================================================
# Sapphire — single-crystal Al2O3 (#136)
# ============================================================================
# Distinct from `alumina` (polycrystalline). Anisotropic: thermal
# conductivity, refractive index, and CTE depend on crystal orientation
# (parallel-c vs perpendicular-c). Canonical scalars below favour the
# c-axis (extraordinary) where the schema accepts a single value, with
# the perpendicular-c value documented in the source notes. CTE uses the
# anisotropic field. Refractive index at sodium D-line (589.3 nm)
# transcribed from Malitson & Dodge 1972 (J. Opt. Soc. Am. 62, 1405)
# via the refractiveindex.info Sellmeier representation; the Crystran
# vendor brief reports the same n_o = 1.768 / n_e = 1.760 to four
# decimal places at 0.590 µm. We pick n_o (ordinary) as the canonical
# scalar — it matches the long-established 1.768 sodium-D figure.
# DO NOT populate `refractive_index_dispersion` here — the #201
# refractiveindex.info enricher owns bulk dispersion; sapphire is not
# yet in its scope and adding the table here would conflict.
[sapphire]
name = "Sapphire"
formula = "Al2O3"

[sapphire.mechanical]
density_value = 3.98
density_unit = "g/cm^3"
youngs_modulus_value = 335
youngs_modulus_unit = "GPa"
shear_modulus_value = 148
shear_modulus_unit = "GPa"
poissons_ratio = 0.25
hardness_vickers = 22.5
flexural_strength_value = 700
flexural_strength_unit = "MPa"
fracture_toughness_value = 2.0
fracture_toughness_unit = "MPa*m^0.5"
cte_anisotropic = [5.0e-6, 5.0e-6, 5.6e-6]

[sapphire.thermal]
melting_point_value = 2040
melting_point_unit = "degC"
thermal_conductivity_value = 27.21
thermal_conductivity_unit = "W/(m*K)"
specific_heat_value = 763
specific_heat_unit = "J/(kg*K)"
thermal_expansion_value = 5.6e-6
thermal_expansion_unit = "1/K"
max_service_temp_value = 2000
max_service_temp_unit = "degC"

[sapphire.electrical]
volume_resistivity_value = 1e16
volume_resistivity_unit = "ohm*cm"
dielectric_constant = 9.4

[sapphire.optical]
refractive_index = 1.768
transparency = 85

[sapphire.vis]
base_color = [0.94, 0.96, 0.98, 0.6]
transmission = 0.85
metallic = 0.0
roughness = 0.05
ior = 1.768


