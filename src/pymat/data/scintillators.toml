# Scintillator crystals and plastic scintillators database
# Units: All values use explicit *_value and *_unit format for v2.0.0 compatibility

[lyso]
name = "LYSO"
formula = "Lu1.8Y0.2SiO5"

[lyso.mechanical]
density_value = 7.1
density_unit = "g/cm^3"

[lyso.optical]
refractive_index = 1.82
light_yield = 32000
decay_time = 41
emission_peak = 420

[lyso.nuclear]
radiation_length = 1.14
interaction_length = 25
[lyso.vis]
base_color = [0.0, 1.0, 1.0, 0.85]
metallic = 0.0
roughness = 0.3
transmission = 0.8
ior = 1.82

[lyso.thermal]
melting_point_value = 2050
melting_point_unit = "degC"

# LYSO:Ce (Cerium-doped)
[lyso.Ce]
name = "LYSO:Ce"
