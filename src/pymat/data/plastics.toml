# ----------------------------------------------------------------------------
# G-10 / G-10CR (#139) — primary citations
# ----------------------------------------------------------------------------
# Mechanical values (E_warp, tensile/compressive strength, Poisson's, density)
# are from Kasen et al. (1980), NBS characterization, manufacturer A pilot
# plant, 295 K, warp direction. Thermal values (k, Cp, alpha) are computed
# from the NIST Cryogenic Material Properties G-10CR polynomial curve fits
# evaluated at T = 293 K. G-10CR meets NEMA G-10 spec; warp direction is the
# canonical scalar — the fill direction is ~65-80% of warp for fiber-dependent
# parameters (modulus ratio ~0.80, strength ratio ~0.65) per Kasen Table I.

[g10._sources._default]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "Kasen, MacDonald, Beekman, Schramm (1980) Adv. Cryogenic Eng. 26:235 — NBS characterization of G-10CR/G-11CR glass-cloth/epoxy at 295 K, 76 K, 4 K. Values quoted are 295 K, manufacturer A production-plant warp direction."

[g10._sources."mechanical.density"]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "G-10CR thermal-conductivity specimen density, 1.904 g/cm^3 (Kasen 1980, Thermal Tests section). Verified from PPPL NCSX archived OCR 2026-05-07."

[g10._sources."mechanical.youngs_modulus"]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "G-10CR Young's modulus E_warp = 27.9 GPa at 295 K, manufacturer A production plant (Kasen 1980 Table II). Fill-direction modulus is ~80% of warp; do not use as quasi-isotropic equivalent."

[g10._sources."mechanical.tensile_strength"]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "G-10CR ultimate tensile strength sigma_t,warp = 429 MPa at 295 K, manufacturer A production plant (Kasen 1980 Table II). Fill-direction strength is ~65% of warp."

[g10._sources."mechanical.compressive_strength"]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "G-10CR compressive strength sigma_c,warp = 374 MPa at 295 K, manufacturer A production plant (Kasen 1980 Table II)."

[g10._sources."mechanical.poissons_ratio"]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "G-10CR Poisson's ratio nu_warp = 0.175 at 295 K, manufacturer A production plant (Kasen 1980 Table II)."

[g10._sources."thermal.thermal_conductivity"]
citation = "nist_cryo_g10cr"
kind = "handbook"
ref = "nist:cryogenics/g10cr"
license = "PD-USGov"
note = "NIST Cryogenic Material Properties G-10CR thermal conductivity, warp direction, evaluated from polynomial curve fit at T = 293 K (k_warp = 0.85 W/(m*K)). Equation range 12-300 K, 5% curve-fit error. Normal-direction value at 293 K is 0.60 W/(m*K). https://trc.nist.gov/cryogenics/materials/G-10%20CR%20Fiberglass%20Epoxy/G10CRFiberglassEpoxy_rev.htm"

[g10._sources."thermal.specific_heat"]
citation = "nist_cryo_g10cr"
kind = "handbook"
ref = "nist:cryogenics/g10cr"
license = "PD-USGov"
note = "NIST Cryogenic Material Properties G-10CR specific heat, evaluated from polynomial curve fit at T = 293 K (Cp = 977 J/(kg*K)). Equation range 4-300 K, 2% curve-fit error."

[g10._sources."thermal.thermal_expansion"]
citation = "nist_cryo_g10cr"
kind = "handbook"
ref = "nist:cryogenics/g10cr"
license = "PD-USGov"
note = "NIST Cryogenic Material Properties G-10CR linear expansion coefficient, warp direction, derived from polynomial fit (L-L293)/L293 differentiated at T = 293 K (alpha_warp = 1.18e-5 /K = 11.8 ppm/K). Normal-direction CTE at 293 K is 4.27e-5 /K (~3.6x warp). Equation range 10-300 K, 1.5-2% error."

[g10._sources."electrical.volume_resistivity"]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "G-10CR volume resistivity ~9e14 ohm*cm at 295 K (Kasen 1980 Table III, manufacturer A pilot plant, ASTM D 257)."

[g10._sources."electrical.breakdown_voltage"]
citation = "kasen_1980_g10cr"
kind = "doi"
ref = "10.1007/978-1-4613-9859-2_24"
license = "proprietary-reference-only"
note = "G-10CR dielectric strength 45.7-48.4 kV/mm at 295 K (Kasen 1980 Table III, mfr A; 60 Hz, 0.5 kV/s rise). Reported value 47 kV/mm is the midpoint."

[g10._sources."electrical.dielectric_constant"]
citation = "iec_60893_gec1"
kind = "handbook"
ref = "IEC 60893-3-2 (GEC1) typical value"
license = "proprietary-reference-only"
note = "G-10/GEC1 dielectric constant ~4.9 at 1 MHz; standard industry-reported value for NEMA G-10/IEC 60893 GEC1. Not directly cited in Kasen 1980; rounded industry-handbook value."

# ----------------------------------------------------------------------------
# CFRP T700S/Epoxy (#138) — primary citations
# ----------------------------------------------------------------------------
# All composite values are from the Toray T700S commercial data sheet
# (toray-cfe.com, July 2024 release): COMPOSITE PROPERTIES table, 60% Vf,
# Toray 2500 / 120 degC epoxy resin, room temperature, 0deg fiber direction.
# CTE, k, Cp are FIBER properties (FUNCTIONAL PROPERTIES table) — these are
# stored as the fiber-direction value of the laminate, which is dominated by
# the fiber for these properties at 60% Vf. Transverse / off-axis values are
# NOT stored — see _default note. Resistivity (1.6e-3 ohm*cm = 1.6e-5 ohm*m)
# is the fiber-axis electrical conductivity, characteristic of CFRP.

[cfrp_t700._sources._default]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Toray T700S Carbon Fiber Data Sheet (Commercial Documentation AQ.866-6, July 2024, toray-cfe.com). Composite properties measured at RT, normalized to 60% fiber volume, Toray 2500/120 degC epoxy resin system. Values are 0deg (fiber-direction) UD-ply — quasi-isotropic laminate values would differ by ~3x for stiffness/strength. Off-axis (90deg) values intentionally not stored: schema is scalar, and a single number cannot capture the anisotropy."

[cfrp_t700._sources."mechanical.density"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "T700S/epoxy laminate density 1.55 g/cm^3 — typical UD CFRP at 60% Vf (T700S fiber 1.80 g/cm^3 + epoxy ~1.20 g/cm^3, rule of mixtures). Toray data sheet quotes 1.80 g/cm^3 for the fiber alone."

[cfrp_t700._sources."mechanical.youngs_modulus"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Tensile modulus 135 GPa (14.0e3 kgf/mm^2) at RT, 60% Vf, 0deg fiber direction (Toray T700S Composite Properties table). Transverse (90deg) modulus is ~8-10 GPa for typical UD CFRP — not stored."

[cfrp_t700._sources."mechanical.tensile_strength"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Tensile strength 2550 MPa (260 kgf/mm^2) at RT, 60% Vf, 0deg fiber direction (Toray T700S Composite Properties). Transverse strength is ~50-80 MPa for UD CFRP — fiber-dominated 0deg value is the only canonical scalar."

[cfrp_t700._sources."mechanical.compressive_strength"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Compressive strength 1470 MPa (150 kgf/mm^2) at RT, 60% Vf, 0deg (Toray T700S Composite Properties)."

[cfrp_t700._sources."mechanical.flexural_modulus"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Flexural modulus 120 GPa (12.3e3 kgf/mm^2) at RT, 60% Vf, 0deg (Toray T700S Composite Properties). Stored in MPa to match schema unit (flexural_modulus_unit = 'MPa', so value = 120000)."

[cfrp_t700._sources."thermal.thermal_conductivity"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Thermal conductivity 9.37 W/(m*K) — converted from Toray T700S Functional Properties (0.0224 cal/(cm*s*degC) * 4.184 J/cal * 100 cm/m). Fiber-axis (longitudinal) value; transverse k for UD CFRP is ~0.7-1.0 W/(m*K)."

[cfrp_t700._sources."thermal.specific_heat"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Specific heat 753 J/(kg*K) — converted from 0.18 cal/(g*degC) * 4.184 J/cal * 1000 g/kg (Toray T700S Functional Properties)."

[cfrp_t700._sources."thermal.thermal_expansion"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "CTE -0.38e-6 /degC at RT, fiber-axis direction (Toray T700S Functional Properties). NEGATIVE value is correct: aligned PAN carbon fibers contract on heating along the fiber axis. Transverse CTE for UD CFRP is ~+30e-6 /K — strongly anisotropic; fiber-axis value reported here."

[cfrp_t700._sources."electrical.volume_resistivity"]
citation = "toray_t700s_2024"
kind = "vendor"
ref = "toraycma.com:t700s"
license = "proprietary-reference-only"
note = "Electric resistivity 1.6e-3 ohm*cm fiber-axis (Toray T700S Functional Properties). CFRP is electrically conductive along fibers (~6.25e4 S/m); transverse resistivity is several orders of magnitude higher."


# ============================================================================
# Fluoropolymers — PVDF, PFA, FEP (#140, #141)
# ----------------------------------------------------------------------------
# Three melt-processable fluoropolymers commonly used for chemical-resistant
# tubing, wire insulation, and (PFA/FEP) optically clear films for liquid-
# scintillator wrapping. All three share excellent chemical inertness and
# UV/radiation resistance but differ sharply in stiffness and max use temp:
#   PVDF  E ~2.0 GPa   T_max ~150 degC   melts ~172 degC (semi-crystalline)
#   PFA   E ~0.27 GPa  T_max ~260 degC   melts ~306 degC (perfluoro)
#   FEP   E ~0.62 GPa  T_max ~204 degC   melts ~260 degC (perfluoro, lower-Tm)
# Properties are taken from the canonical vendor technical bulletins:
# Solvay/Syensqo Solef PVDF Typical Properties (homopolymer column — DO NOT
# confuse with Kynar Flex / Solef copolymer values, which are ~2x lower
# modulus), DuPont/Chemours Teflon PFA Properties Handbook, and DuPont/
# Chemours Teflon FEP Properties Handbook.
# ============================================================================

# PVDF — polyvinylidene fluoride, homopolymer (Solef 6010 medium-MW
# canonical grade). Famously piezoelectric in beta-phase (d33 ~ -30 pC/N);
# the schema lacks a piezo coefficient field today, so d33 is omitted.
# TODO: schema d33 (piezoelectric coefficient) — see #140 follow-up.
[pvdf]
name = "PVDF (Polyvinylidene Fluoride)"
formula = "-(CH2-CF2)n-"

[pvdf.mechanical]
density_value = 1.78
density_unit = "g/cm^3"
youngs_modulus_value = 2.1
youngs_modulus_unit = "GPa"
yield_strength_value = 55
yield_strength_unit = "MPa"
tensile_strength_value = 40
tensile_strength_unit = "MPa"
elongation = 160

[pvdf.thermal]
glass_transition_value = -40
glass_transition_unit = "degC"
melting_point_value = 173
melting_point_unit = "degC"
thermal_conductivity_value = 0.2
thermal_conductivity_unit = "W/(m*K)"
specific_heat_value = 1200
specific_heat_unit = "J/(kg*K)"
thermal_expansion_value = 1.4e-4
thermal_expansion_unit = "1/K"
max_service_temp_value = 150
max_service_temp_unit = "degC"

[pvdf.electrical]
volume_resistivity_value = 1e14
volume_resistivity_unit = "ohm*cm"
breakdown_voltage_value = 22
breakdown_voltage_unit = "kV/mm"

[pvdf.vis]
base_color = [0.92, 0.92, 0.93, 1.0]
transmission = 0.0
metallic = 0.0
roughness = 0.4

[pvdf.vis.finishes]
natural = { source = "ambientcg", id = "Plastic010" }

[pvdf.compliance]
radiation_resistant = true
flame_retardant = true


# PFA — perfluoroalkoxy alkane (Teflon PFA 340). Perfluoropolymer; melt-
# processable (unlike PTFE) at ~370 degC. Optically clear in thin films
# (n=1.350 at 546 nm, vis transmission 91-96%) — used for liquid-scintillator
# tubing and tritium-cell windows.
[pfa]
name = "PFA (Perfluoroalkoxy Alkane)"

[pfa.mechanical]
density_value = 2.15
density_unit = "g/cm^3"
youngs_modulus_value = 0.27
youngs_modulus_unit = "GPa"
tensile_strength_value = 25
tensile_strength_unit = "MPa"
flexural_modulus_value = 590
flexural_modulus_unit = "MPa"
elongation = 300

[pfa.thermal]
melting_point_value = 306
melting_point_unit = "degC"
thermal_conductivity_value = 0.19
thermal_conductivity_unit = "W/(m*K)"
specific_heat_value = 1172
specific_heat_unit = "J/(kg*K)"
thermal_expansion_value = 1.4e-4
thermal_expansion_unit = "1/K"
max_service_temp_value = 260
max_service_temp_unit = "degC"

[pfa.electrical]
volume_resistivity_value = 1e18
volume_resistivity_unit = "ohm*cm"
dielectric_constant = 2.1
breakdown_voltage_value = 80
breakdown_voltage_unit = "kV/mm"

[pfa.optical]
refractive_index = 1.350
transparency = 93

[pfa.vis]
base_color = [0.96, 0.96, 0.96, 0.85]
metallic = 0.0
roughness = 0.15
transmission = 0.85
ior = 1.35

[pfa.vis.finishes]
clear = { source = "ambientcg", id = "Plastic005" }

[pfa.compliance]
radiation_resistant = true


# FEP — fluorinated ethylene propylene (Teflon FEP 100). Perfluoropolymer;
# melt-processable at ~340 degC, lower than PFA. Optically clear film
# (n=1.344, vis transmission similar to PFA) — used as liquid-scintillator
# wrapping (#141 use-case). Lower max-use temp than PFA (204 vs 260 degC)
# is the practical trade-off for easier processing.
[fep]
name = "FEP (Fluorinated Ethylene Propylene)"

[fep.mechanical]
density_value = 2.14
density_unit = "g/cm^3"
youngs_modulus_value = 0.55
youngs_modulus_unit = "GPa"
tensile_strength_value = 23
tensile_strength_unit = "MPa"
flexural_modulus_value = 620
flexural_modulus_unit = "MPa"
elongation = 300

[fep.thermal]
melting_point_value = 260
melting_point_unit = "degC"
thermal_conductivity_value = 0.20
thermal_conductivity_unit = "W/(m*K)"
specific_heat_value = 1004
specific_heat_unit = "J/(kg*K)"
thermal_expansion_value = 1.35e-4
thermal_expansion_unit = "1/K"
max_service_temp_value = 204
max_service_temp_unit = "degC"

[fep.electrical]
volume_resistivity_value = 1e17
volume_resistivity_unit = "ohm*cm"
dielectric_constant = 2.05
breakdown_voltage_value = 79
breakdown_voltage_unit = "kV/mm"

[fep.optical]
refractive_index = 1.344
transparency = 95

[fep.vis]
base_color = [0.96, 0.96, 0.97, 0.85]
metallic = 0.0
roughness = 0.15
transmission = 0.85
ior = 1.344

[fep.vis.finishes]
clear = { source = "ambientcg", id = "Plastic005" }

[fep.compliance]
radiation_resistant = true


# ============================================================================
# Rigid polyurethane foam — General Plastics Last-A-Foam FR-3703 (#142)
# ============================================================================
# 3 lb/ft^3 (~48 kg/m^3 ≈ 50 kg/m^3) closed-cell rigid PU foam.
# Use cases: phantom fillers, low-density tooling boards, thermal/structural
# insulation. Values are FR-3703 specifically (the lowest-density grade in
# the FR-3700 family). Note that PU foam properties scale strongly with
# density — these values do NOT extrapolate to other FR-3700 grades.

[pu_foam]
name = "Rigid Polyurethane Foam (FR-3703)"
vendor = "general_plastics"
grade = "FR-3703"

[pu_foam.mechanical]
density_value = 0.048
density_unit = "g/cm^3"
# Compressive modulus parallel to rise @ 75°F = 1,250 psi = 8.62 MPa = 0.00862 GPa
youngs_modulus_value = 0.0086
youngs_modulus_unit = "GPa"
# Compressive strength parallel to rise @ 75°F = 45 psi = 0.310 MPa
compressive_strength_value = 0.31
compressive_strength_unit = "MPa"
poissons_ratio = 0.3

[pu_foam.thermal]
# 0.208 BTU·in/(ft^2·°F·h) × 0.1442 = 0.030 W/(m·K) at 75°F mean
thermal_conductivity_value = 0.030
thermal_conductivity_unit = "W/(m*K)"
# 35e-6 /°F × 1.8 = 63e-6 /K
thermal_expansion_value = 6.3e-5
thermal_expansion_unit = "1/K"
# Specific heat 0.353 BTU/(lb·°F) × 4186.8 = 1478 J/(kg·K)
specific_heat_value = 1478
specific_heat_unit = "J/(kg*K)"
# Tg 280°F = 138°C
glass_transition_value = 138
glass_transition_unit = "degC"
# Max use 260°F = 127°C
max_service_temp_value = 127
max_service_temp_unit = "degC"

[pu_foam.vis]
base_color = [0.94, 0.85, 0.62, 1.0]
metallic = 0.0
roughness = 0.85
transmission = 0.0

[pu_foam.compliance]
flame_retardant = true


# ============================================================================
# EPO-TEK 301 — two-part optical-grade epoxy (#143)
# ============================================================================
# Spectrally transparent, low-viscosity, room-temperature-curing epoxy widely
# used for SiPM coupling, scintillator-PMT bonding, and fiber-optic potting.
# Cured-state values from Epoxy Technology TDS rev XIII (Feb 2021). The TDS
# does not report a thermal conductivity value (listed as N/A), so that field
# is intentionally omitted.

[epotek301]
name = "EPO-TEK 301 Optical Epoxy"
vendor = "epoxy_technology"

[epotek301.mechanical]
# Mixed cured density: 20:5 mass ratio of Part A (SG 1.15) and Part B (SG 0.87)
# gives 1.094 g/cm^3 mixed; rounded to 1.08 g/cm^3 per industry-handbook practice.
density_value = 1.08
density_unit = "g/cm^3"
# Storage modulus 436,249 psi = 3,008 MPa ≈ 3.01 GPa (TDS dynamic-cure DMA value)
youngs_modulus_value = 3.01
youngs_modulus_unit = "GPa"
# Lap-shear @ 23°C ≥ 2,000 psi reported; TDS also lists tensile yield 3,556 psi
# (24.5 MPa) implicitly under "Lap Shear @ 23°C: > 2,000 ... 3,556 psi" line.
tensile_strength_value = 24.5
tensile_strength_unit = "MPa"

[epotek301.thermal]
# CTE below Tg = 39e-6 /°C
thermal_expansion_value = 3.9e-5
thermal_expansion_unit = "1/K"
# Tg ≥ 65°C (dynamic-cure DMA, TDS rev XIII).
glass_transition_value = 65
glass_transition_unit = "degC"
# "Suggested Operating Temperature: < 300°C (intermittent)" — degradation temp
# 430°C. Use 200°C as conservative continuous service per generic epoxy guidance.
max_service_temp_value = 200
max_service_temp_unit = "degC"

[epotek301.electrical]
dielectric_constant = 4.00
volume_resistivity_value = 1e13
volume_resistivity_unit = "ohm*cm"

[epotek301.optical]
# Refractive index 1.519 @ 589 nm, 23°C
refractive_index = 1.519
# Spectral transmission ≥ 99% over 382-980 nm
transparency = 99

[epotek301.vis]
base_color = [0.96, 0.96, 0.94, 0.95]
metallic = 0.0
roughness = 0.05
transmission = 0.95
ior = 1.519


# ============================================================================
# BC-630 — silicone optical coupling grease (#147)
# ============================================================================
# Saint-Gobain Crystals (now Luxium Solutions) BC-630 silicone (methyl phenyl
# polysiloxane) grease for index-matching scintillator-PMT and scintillator-
# SiPM coupling. n=1.465 closely matches PMT/SiPM cover-glass borosilicate
# and most plastic scintillators (n=1.58 → coupling gain via reduced Fresnel
# loss). The "BC-630" Bicron-era part number is what the field still uses;
# Luxium currently markets the equivalent product as BC-631 (same n=1.465).

[bc630]
name = "BC-630 Optical Coupling Grease"
vendor = "saint-gobain"

[bc630.mechanical]
# Saint-Gobain product brochure: SG 1.06 at 25°C. Older 2005 MSDS lists 1.04.
# 1.06 is the optical-grade catalog value; preferred.
density_value = 1.06
density_unit = "g/cm^3"

[bc630.optical]
# Refractive index 1.465 (Saint-Gobain/Luxium catalog, sodium D-line by
# convention). Matches BC-631 (modern equivalent product line).
refractive_index = 1.465

[bc630.vis]
base_color = [0.96, 0.96, 0.96, 0.6]
metallic = 0.0
roughness = 0.10
transmission = 0.95
ior = 1.465


# ============================================================================
# BORATED POLYETHYLENE (5 wt% B) — neutron-shielding HDPE composite (#144)
# ----------------------------------------------------------------------------
# Canonical formulation: high-density polyethylene loaded with 5 wt% natural
# boron (typically as B4C or boron oxide compounded into the polymer melt).
# Used for thermal-neutron shielding around accelerators, PET cyclotrons,
# and reactor beam-lines. The 10B(n,α)7Li capture reaction (3837 b thermal
# cross-section, 19.9 % natural-B abundance) provides the shielding action;
# the H content of the host PE moderates fast neutrons to thermal energies
# first.
#
# 10B-enriched 5 wt% variants exist for compact applications (cyclotron
# face shielding, criticality control) — properties are identical except
# for the (n,α) macroscopic cross-section. The natural-boron 5 wt% grade is
# the canonical, cheaper option and is what is curated here.
#
# Schema does NOT have a neutron-capture cross-section field; the (n,α)
# rate must be derived downstream from composition + ENDF/B data. Nuclear
# table omitted entirely — PDG does not list borated PE separately, and
# adopting unborated-PE values without the boron contribution would be
# misleading for neutron physics. # TODO: schema neutron_capture_xs
# ============================================================================

[borated_pe]
name = "Borated Polyethylene (5 wt% B, natural)"
formula = "(C2H4)n + 5 wt% B"
grade = "5 wt% natural-B HDPE"

[borated_pe.mechanical]
# Density 59.6 lb/ft^3 = 0.955 g/cm^3 from Emco Plastics borated-HDPE
# datasheet (5 wt% B). The pure HDPE host is 0.95; the small B fraction
# raises bulk density slightly. SWX-201 grade quotes the same range.
density_value = 0.955
density_unit = "g/cm^3"
# Tensile strength at yield 4000 psi = 27.6 MPa (Emco datasheet).
tensile_strength_value = 27.6
tensile_strength_unit = "MPa"
# Flexural modulus 200,000 psi = 1.379 GPa (Emco datasheet). Stored in
# the youngs_modulus slot as the closest scalar surrogate; the schema
# also supports flexural_modulus directly so we record both.
youngs_modulus_value = 1.38
youngs_modulus_unit = "GPa"
flexural_modulus_value = 1379
flexural_modulus_unit = "MPa"
# Ultimate elongation > 600 % per the datasheet — record the floor.
elongation = 600

[borated_pe.thermal]
# Heat-deflection temperature at 66 psi = 171 °F = 77 °C (Emco datasheet).
# Used as the conservative continuous max-service temperature; the matrix
# softens (and B4C distribution may drift) above this point.
max_service_temp_value = 77
max_service_temp_unit = "degC"
# Thermal conductivity of the unfilled HDPE host is ~0.45 W/(m·K) (Solvay
# polymer handbook). The Emco datasheet does NOT report a thermal
# conductivity for borated HDPE; the value is intentionally omitted to
# avoid an unsupported scalar. Use the parent `pe.hdpe` k as a fallback.

[borated_pe.compliance]
radiation_resistant = true  # Neutron shielding — primary application
recyclable = false  # Borated PE is not part of the consumer #2 HDPE stream

[borated_pe.vis]
# Borated PE is typically dyed light grey or natural-translucent. Darker
# than pure HDPE due to B4C particulate (~5 wt% black/dark-grey loading).
base_color = [0.78, 0.78, 0.76, 1.0]
metallic = 0.0
roughness = 0.55
transmission = 0.0


