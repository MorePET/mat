# Typos checker config
# https://github.com/crate-ci/typos

[default]
# Don't flag identifiers that match chemical element symbols or
# common materials-science product names as typos.
extend-ignore-identifiers-re = [
    "^[A-Z][a-z]?$",  # single chemical element symbols like Nd, Ba, Eu, Fe
]

[default.extend-words]
# Product/brand names commonly used in materials science
Macor = "Macor"
macor = "macor"
# "Ba" is the chemical symbol for Barium; the default dictionary
# suggests "By"/"Be".
Ba = "Ba"
# Chemical element symbols that otherwise look like typos.
Nd = "Nd"
# Three.js `MeshPhysicalMaterial` uses `metalness` as its PBR field
# name; the default dictionary replaces it with "metallicity".
metalness = "metalness"
# "PNGs" (plural of the PNG file format) — typos rewrites to "ONGs".
PNGs = "PNGs"
pngs = "pngs"
# Deliberate misspelling appearing in a test docstring as an example
# of the kind of TOML key typo the integrity test catches. The actual
# TOML-side enforcement lives in tests/test_toml_integrity.py — this
# entry just stops the source-text typo checker from rewriting the
# example out of existence.
mechnical = "mechnical"
# Deliberate typo fixtures used by ``TestTypoTolerance`` in
# ``tests/test_search.py`` (3.9.0) — they exercise rapidfuzz scorer
# tolerance for one-edit drops/transpositions. The typo checker
# would otherwise rewrite the test inputs out of existence.
Stinless = "Stinless"
stinless = "stinless"
Stainles = "Stainles"
stainles = "stainles"
# Scintillator material acronyms — LSO is "lutetium oxyorthosilicate"
# (Lu2SiO5), the historical parent of LYSO. Typos otherwise rewrites
# every instance of "LSO" to "ALSO" (#170).
LSO = "LSO"
lso = "lso"
# PubChem annotation-node identifier appearing in the PUG-View JSON
# fixture (tests/fixtures/pubchem_water.json, #165). `typos` would
# otherwise rewrite "ANID" to "AND" inside the captured response,
# diverging the fixture from real PubChem output.
ANID = "ANID"
# `typos` 1.46 matches the SUBSTRING "Pont" → "Point" inside any word,
# which rewrites "DuPont" → "DuPoint" in ceramics.toml citation notes
# (#135). The fix is to allowlist "Pont" itself; the full-word
# allowlist below doesn't help because typos doesn't see "DuPont"
# as a single token.
Pont = "Pont"
pont = "pont"
DuPont = "DuPont"
dupont = "dupont"
# American Concrete Institute (ACI) — concrete-engineering standards body.
# `typos` rewrites "ACI" → "ACPI" (Advanced Configuration and Power
# Interface). Cited in ceramics.toml comments referencing ACI 318 (#145).
ACI = "ACI"

[files]
extend-exclude = [
    "uv.lock",
    "*.lock",
    "Cargo.lock",
]
